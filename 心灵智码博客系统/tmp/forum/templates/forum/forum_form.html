{% extends 'base.html' %}

{% block content %}
    <h1>{% if forum %}编辑板块{% else %}创建板块{% endif %}</h1>
    <form method="post" style="max-width: 600px; margin: 0 auto;">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <label for="id_name" style="display: block; margin-bottom: 5px; font-weight: 500;">板块名称</label>
            {{ form.name }}
        </div>
        <div style="margin-bottom: 20px;">
            <label for="id_slug" style="display: block; margin-bottom: 5px; font-weight: 500;">Slug</label>
            {{ form.slug }}
            <small style="color: #666;">URL友好的标识符</small>
        </div>
        <div style="margin-bottom: 20px;">
            <label for="id_description" style="display: block; margin-bottom: 5px; font-weight: 500;">描述</label>
            {{ form.description }}
        </div>
        <div style="text-align: center; margin-top: 30px; padding: 20px; border-top: 1px solid #eee;">
            <button type="submit" style="display: inline-block; padding: 12px 24px; background-color: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: 500; margin-right: 10px;">{% if forum %}更新板块{% else %}创建板块{% endif %}</button>
            <a href="{% url 'forum_list' %}" style="display: inline-block; padding: 12px 24px; background-color: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: 500; text-decoration: none;">取消</a>
        </div>
    </form>
{% endblock %}
