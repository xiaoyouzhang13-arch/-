{% extends 'base.html' %}

{% block content %}
    <h1>删除文件</h1>
    
    <div class="card" style="max-width: 600px; margin: 0 auto; padding: 30px;">
        <h3 style="margin-bottom: 20px;">确认删除</h3>
        <p style="margin-bottom: 30px;">您确定要删除文件 <strong>{{ file.name }}</strong> 吗？此操作无法撤销。</p>
        
        <form method="post">
            {% csrf_token %}
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button type="submit" class="btn btn-secondary">删除</button>
                <a href="{% url 'file_list' %}" class="btn">取消</a>
            </div>
        </form>
    </div>
{% endblock %}
